name: retrofit_generator
description: retrofit generator is an dio client generator using source_gen and
  inspired by Chopper and Retrofit.
homepage: https://mings.in/retrofit.dart/
repository: https://github.com/trevorwang/retrofit.dart/
topics:
  - api
  - http
  - rest
  - retrofit
  - codegen
version: 10.2.4
environment:
  sdk: ">=3.8.0 <4.0.0"

publish_to: none

dependencies:
  analyzer: ">=8.4.1 <13.0.0"
  # analyzer: ">=8.0.0 <10.0.0"
  build: ">=3.1.0 <5.0.0"
  built_collection: ^5.1.1
  code_builder: ^4.11.1
  dart_style: ^3.1.1
  lean_builder: ^0.1.2
  retrofit:
    git:
      url: https://github.com/Flutter-Fox/retrofit.dart.git
      ref: downgrade/analyzer
      path: retrofit
  source_gen: ">=3.1.0 <5.0.0"
  dio: ^5.9.0
  protobuf: ^6.0.0

dev_dependencies:
  coverage: any
  lints: any
  source_gen_test: ^1.3.5
  test: ^1.31.0
